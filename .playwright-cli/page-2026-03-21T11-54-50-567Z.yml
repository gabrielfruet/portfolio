      - heading "Why do we need IoU based loss functions?" [level=1] [ref=e16]
      - paragraph [ref=e17]: "A question that may arise when entering the world of object detection is: Why do IoU-based loss functions perform better than L1 loss?"
      - paragraph [ref=e18]: Intuitively, we generally think of object detection as purely a regression problem. So, if we minimize the difference (e.g., L1 or L2 loss) between the predicted and the ground truth bounding boxes, we should get a good model.
      - paragraph [ref=e19]:
        - text: This is partially true, but not entirely. Since we evaluate the model using metrics such as mAP, we want to minimize the difference between the predicted and the ground truth bounding box in terms of IoU. In general, the L1 loss
        - strong [ref=e20]: does
        - text: that, but not directly.
      - heading "Loss landscape" [level=1] [ref=e21]
      - paragraph [ref=e22]: When training a model, we aim to minimize the loss function. We can visualize our model as a “point” in the loss landscape, which we want to move to the global minimum. This movement is entirely dependent on how the gradient behaves in the neighborhood of the current point.
      - paragraph [ref=e23]: Simply put, the shape of the loss landscape determines how the model learns.
      - heading "The ball example" [level=2] [ref=e24]
      - paragraph [ref=e25]: Think of our model as a ball in a landscape. We want it to roll to the lowest point.
      - paragraph [ref=e26]: If the terrain is smooth and sloped (good gradients), the ball rolls naturally to the bottom—just like how optimizers (SGD, Adam) follow the slope. If the terrain is flat, the ball stops moving.
